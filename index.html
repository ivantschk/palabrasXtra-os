<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- user-scalable=no previene el pinch-zoom del browser que interferiría con el pan -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>palabras</title>
    <link rel="stylesheet" href="https://unpkg.com/playhtml@2.10.1/dist/style.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        /* ── Viewport ── */
        #board {
            position: fixed;
            inset: 0;
            overflow: hidden;
            cursor: grab;

            /* touch-action: none previene scroll/zoom del browser
               para todos los toques que empiecen en este elemento */
            touch-action: none;

            background: linear-gradient(
                175deg,
                #ffffff 0%,
                #f7f7f7 55%,
                #eeeeee 100%
            );
        }

        #board.panning {
            cursor: grabbing;
        }

        /* ── Canvas infinito ── */
        #world {
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
            touch-action: none;
        }

        /* ── Imanes de palabras ── */
        .word-card {
            position: absolute;
            background: #dc2626;
            color: #000000;
            padding: 10px 20px;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            white-space: nowrap;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;

            /* Impide que el browser interfiera con el drag de palabras */
            touch-action: none;

            box-shadow:
                0  2px 0   #991b1b,
                0  4px 12px rgba(0, 0, 0, 0.25);
        }

        .word-card:active {
            cursor: grabbing;
        }

        /* ── Modal ── */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            /* Permite que el teclado virtual empuje el contenido */
            align-items: flex-end;
            padding-bottom: env(safe-area-inset-bottom);
        }

        @media (min-height: 500px) {
            #modal-overlay {
                align-items: center;
                padding-bottom: 0;
            }
        }

        #modal-overlay.hidden {
            display: none;
        }

        #modal {
            background: #fff;
            border: 2px solid #000;
            padding: 40px 36px 36px;
            text-align: center;
            width: 100%;
            max-width: 420px;
            border-radius: 0;
            border-bottom: none;
        }

        @media (min-height: 500px) {
            #modal {
                border-bottom: 2px solid #000;
                width: 90%;
            }
        }

        #modal p {
            font-size: 0.95rem;
            letter-spacing: 0.07em;
            text-transform: lowercase;
            margin-bottom: 24px;
            color: #111;
        }

        #word-input {
            display: block;
            width: 100%;
            padding: 14px 16px;
            font-size: 1.2rem;
            font-family: inherit;
            border: 2px solid #000;
            outline: none;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 0.06em;
            background: #fafafa;
            border-radius: 0;
            /* Evita zoom automático en iOS al enfocar inputs < 16px */
            -webkit-text-size-adjust: 100%;
        }

        #word-input:focus {
            border-color: #dc2626;
            background: #fff;
        }

        #word-submit {
            display: block;
            width: 100%;
            background: #dc2626;
            color: #fff;
            border: none;
            padding: 16px;
            font-size: 1rem;
            font-family: inherit;
            letter-spacing: 0.09em;
            text-transform: lowercase;
            cursor: pointer;
            box-shadow: 0 2px 0 #991b1b;
            border-radius: 0;
        }

        #word-submit:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        /* ── Indicación ── */
        #hint {
            position: fixed;
            bottom: max(16px, env(safe-area-inset-bottom));
            right: 18px;
            font-size: 0.65rem;
            color: #c8c8c8;
            letter-spacing: 0.06em;
            pointer-events: none;
            text-align: right;
            line-height: 1.9;
        }
    </style>
</head>
<body>

<div id="board">
    <div id="world"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <p>agregá una palabra al espacio</p>
        <input
            id="word-input"
            type="text"
            inputmode="text"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
            maxlength="30"
            placeholder="escribí algo..."
        >
        <button id="word-submit">agregar</button>
    </div>
</div>

<span id="hint">
    arrastrá el fondo para moverte<br>
    arrastrá las palabras para moverlas
</span>

<script type="module">
import { playhtml } from "https://unpkg.com/playhtml@2.10.1/dist/playhtml.es.js";

await playhtml.init();

const { createPageData, setupPlayElement } = playhtml;

// ── Palabras iniciales ────────────────────────────────────────────────────────
const DEFAULTS = [
    { id: "pw-hola",  text: "hola",  x: 40,  y: 180 },
    { id: "pw-como",  text: "como",  x: 180, y: 290 },
    { id: "pw-estas", text: "estas", x: 80,  y: 400 },
];

// ── Estado compartido entre visitantes ────────────────────────────────────────
const wordData = createPageData("palabras-v3", DEFAULTS);

const board = document.getElementById("board");
const world = document.getElementById("world");

// ── Crear imanes ──────────────────────────────────────────────────────────────
function addCard(word) {
    if (document.getElementById(word.id)) return;

    const el = document.createElement("div");
    el.id          = word.id;
    el.className   = "word-card";
    el.textContent = word.text;
    el.setAttribute("can-move", "");
    el.style.left  = word.x + "px";
    el.style.top   = word.y + "px";

    world.appendChild(el);
    setupPlayElement(el);
}

wordData.getData().forEach(addCard);
wordData.onUpdate((words) => words.forEach(addCard));

// ── Agregar palabra nueva ─────────────────────────────────────────────────────
function addWord(text) {
    text = text.trim().toLowerCase();
    if (!text) return false;

    // Aparecer cerca del centro de la vista actual
    const scatter = () => (Math.random() - 0.5) * 260;
    const wx = Math.round(window.innerWidth  / 2 - panX + scatter());
    const wy = Math.round(window.innerHeight / 2 - panY + scatter());
    const id = "pw-" + Date.now();

    wordData.setData([...wordData.getData(), { id, text, x: wx, y: wy }]);
    return true;
}

// ── Pan con inercia ───────────────────────────────────────────────────────────
let panX = 0, panY = 0;
let panActive = false;
let panStartX = 0, panStartY = 0;
let velX = 0, velY = 0;
let lastMoveX = 0, lastMoveY = 0, lastMoveTime = 0;
let inertiaFrame = null;

// Restaurar posición de última sesión en este dispositivo
const saved = JSON.parse(localStorage.getItem("palabras-v3-pan") || "null");
if (saved) { panX = saved.x; panY = saved.y; }

function applyPan() {
    world.style.transform = `translate(${panX}px, ${panY}px)`;
}
applyPan();

function savePan() {
    localStorage.setItem("palabras-v3-pan", JSON.stringify({ x: panX, y: panY }));
}

function stopInertia() {
    if (inertiaFrame) { cancelAnimationFrame(inertiaFrame); inertiaFrame = null; }
}

function startInertia() {
    stopInertia();
    const FRICTION = 0.90;

    function tick() {
        velX *= FRICTION;
        velY *= FRICTION;
        if (Math.abs(velX) < 0.4 && Math.abs(velY) < 0.4) { savePan(); return; }
        panX += velX;
        panY += velY;
        applyPan();
        inertiaFrame = requestAnimationFrame(tick);
    }
    inertiaFrame = requestAnimationFrame(tick);
}

board.addEventListener("pointerdown", (e) => {
    // Si toca un imán, dejar que playhtml lo maneje
    if (e.target.closest(".word-card")) return;

    stopInertia();
    panActive = true;
    panStartX = e.clientX - panX;
    panStartY = e.clientY - panY;
    velX = 0; velY = 0;
    lastMoveX = e.clientX;
    lastMoveY = e.clientY;
    lastMoveTime = Date.now();

    board.classList.add("panning");
    board.setPointerCapture(e.pointerId);
    e.preventDefault();
});

board.addEventListener("pointermove", (e) => {
    if (!panActive) return;

    const now = Date.now();
    const dt = Math.max(1, now - lastMoveTime);

    // Velocidad suavizada (exponential moving average)
    const rawVX = (e.clientX - lastMoveX) / dt * 16;
    const rawVY = (e.clientY - lastMoveY) / dt * 16;
    velX = velX * 0.4 + rawVX * 0.6;
    velY = velY * 0.4 + rawVY * 0.6;

    lastMoveX = e.clientX;
    lastMoveY = e.clientY;
    lastMoveTime = now;

    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
    applyPan();
    e.preventDefault();
});

board.addEventListener("pointerup", () => {
    if (!panActive) return;
    panActive = false;
    board.classList.remove("panning");
    startInertia();
});

board.addEventListener("pointercancel", () => {
    panActive = false;
    board.classList.remove("panning");
    velX = 0; velY = 0;
    savePan();
});

// ── Modal ─────────────────────────────────────────────────────────────────────
const overlay = document.getElementById("modal-overlay");
const input   = document.getElementById("word-input");

function submit() {
    if (addWord(input.value)) overlay.classList.add("hidden");
    else input.focus();
}

document.getElementById("word-submit").addEventListener("click", submit);
input.addEventListener("keydown", (e) => e.key === "Enter" && submit());
</script>

</body>
</html>
